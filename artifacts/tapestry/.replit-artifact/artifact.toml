kind = "web"
previewPath = "/"
title = "Tapestry"
version = "1.0.0"
id = "artifacts/tapestry"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25278

[services.development]
run = "pnpm --filter @workspace/tapestry run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tapestry", "run", "build" ]
publicDir = "artifacts/tapestry/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25278"
BASE_PATH = "/"
