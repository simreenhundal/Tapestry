openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: employees
    description: Employee operations
  - name: ai
    description: AI operations
  - name: calendar
    description: Calendar integration operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /employees:
    get:
      operationId: listEmployees
      tags: [employees]
      summary: List all employees
      responses:
        "200":
          description: A list of employees
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListEmployeesResponse"
    post:
      operationId: createEmployee
      tags: [employees]
      summary: Create an employee profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEmployeeBody"
      responses:
        "201":
          description: Employee created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"
  /context-insight:
    post:
      operationId: generateContextInsight
      tags: [ai]
      summary: Generate AI meeting readiness report for a list of employees
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MeetingReadinessRequest"
      responses:
        "200":
          description: Meeting readiness report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeetingReadinessResponse"
  /calendar/status:
    get:
      operationId: getCalendarStatus
      tags: [calendar]
      summary: Get calendar connection status
      responses:
        "200":
          description: Calendar connection status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalendarStatus"
  /calendar/meetings:
    get:
      operationId: listCalendarMeetings
      tags: [calendar]
      summary: List upcoming meetings with matched employee context
      parameters:
        - in: query
          name: hoursAhead
          schema:
            type: integer
            default: 48
          description: How many hours ahead to look for meetings
      responses:
        "200":
          description: Upcoming meetings with matched Tapestry employees
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalendarMeetingsResponse"
        "503":
          description: No calendar connected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalendarError"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    Employee:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        company:
          type: string
        city:
          type: string
        country:
          type: string
        timezone:
          type: string
        role:
          type: string
        religion:
          type: string
        culturalBackground:
          type: string
        caregivingResponsibilities:
          type: string
        preferredWorkStart:
          type: string
        preferredWorkEnd:
          type: string
        preferredWorkDays:
          type: array
          items:
            type: string
        healthConsiderations:
          type: string
        additionalContext:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - email
        - city
        - country
        - timezone
        - createdAt
    CreateEmployeeBody:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        company:
          type: string
        city:
          type: string
        country:
          type: string
        timezone:
          type: string
        role:
          type: string
        religion:
          type: string
        culturalBackground:
          type: string
        caregivingResponsibilities:
          type: string
        preferredWorkStart:
          type: string
        preferredWorkEnd:
          type: string
        preferredWorkDays:
          type: array
          items:
            type: string
        healthConsiderations:
          type: string
        additionalContext:
          type: string
      required:
        - name
        - email
        - city
        - country
    ListEmployeesResponse:
      type: array
      items:
        $ref: "#/components/schemas/Employee"
    MeetingReadinessRequest:
      type: object
      properties:
        employeeIds:
          type: array
          items:
            type: integer
          description: List of employee IDs to check readiness for
        meetingDatetime:
          type: string
          description: ISO 8601 datetime string (UTC) of the proposed meeting
      required:
        - employeeIds
        - meetingDatetime
    AttendeeReadiness:
      type: object
      properties:
        employeeId:
          type: integer
        name:
          type: string
        city:
          type: string
        timezone:
          type: string
        localTime:
          type: string
        signal:
          type: string
          enum: [green, yellow, red]
        reason:
          type: string
      required:
        - employeeId
        - name
        - city
        - timezone
        - localTime
        - signal
        - reason
    MeetingReadinessResponse:
      type: object
      properties:
        attendees:
          type: array
          items:
            $ref: "#/components/schemas/AttendeeReadiness"
        aggregateSignal:
          type: string
          enum: [green, yellow, red]
        recommendation:
          type: string
        alternatives:
          type: array
          items:
            type: string
      required:
        - attendees
        - aggregateSignal
        - recommendation
        - alternatives
    CalendarStatus:
      type: object
      properties:
        google:
          type: boolean
        microsoft:
          type: boolean
      required:
        - google
        - microsoft
    CalendarAttendee:
      type: object
      properties:
        email:
          type: string
        name:
          type: string
      required:
        - email
        - name
    MatchedEmployee:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        city:
          type: string
        country:
          type: string
        timezone:
          type: string
        religion:
          type: string
        culturalBackground:
          type: string
        caregivingResponsibilities:
          type: string
        additionalContext:
          type: string
      required:
        - id
        - name
        - email
        - city
        - country
        - timezone
    CalendarMeeting:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        start:
          type: string
          format: date-time
        end:
          type: string
          format: date-time
        provider:
          type: string
          enum: [google, microsoft]
        attendees:
          type: array
          items:
            $ref: "#/components/schemas/CalendarAttendee"
        matchedEmployees:
          type: array
          items:
            $ref: "#/components/schemas/MatchedEmployee"
      required:
        - id
        - title
        - start
        - end
        - provider
        - attendees
        - matchedEmployees
    CalendarMeetingsResponse:
      type: object
      properties:
        meetings:
          type: array
          items:
            $ref: "#/components/schemas/CalendarMeeting"
        provider:
          type: string
          enum: [google, microsoft]
      required:
        - meetings
        - provider
    CalendarError:
      type: object
      properties:
        error:
          type: string
        connected:
          type: boolean
      required:
        - error
        - connected
