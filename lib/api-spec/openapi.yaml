openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: employees
    description: Employee operations
  - name: ai
    description: AI operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /employees:
    get:
      operationId: listEmployees
      tags: [employees]
      summary: List all employees
      responses:
        "200":
          description: A list of employees
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListEmployeesResponse"
    post:
      operationId: createEmployee
      tags: [employees]
      summary: Create an employee profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEmployeeBody"
      responses:
        "201":
          description: Employee created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"
  /context-insight:
    post:
      operationId: generateContextInsight
      tags: [ai]
      summary: Generate AI context insight for an employee
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContextInsightRequest"
      responses:
        "200":
          description: AI context insight generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContextInsightResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    Employee:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        city:
          type: string
        country:
          type: string
        timezone:
          type: string
        religion:
          type: string
        culturalBackground:
          type: string
        caregivingResponsibilities:
          type: string
        additionalContext:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - email
        - city
        - country
        - timezone
        - createdAt
    CreateEmployeeBody:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        city:
          type: string
        country:
          type: string
        timezone:
          type: string
        religion:
          type: string
        culturalBackground:
          type: string
        caregivingResponsibilities:
          type: string
        additionalContext:
          type: string
      required:
        - name
        - email
        - city
        - country
    ListEmployeesResponse:
      type: array
      items:
        $ref: "#/components/schemas/Employee"
    ContextInsightRequest:
      type: object
      properties:
        name:
          type: string
        city:
          type: string
        country:
          type: string
        timezone:
          type: string
        religion:
          type: string
        culturalBackground:
          type: string
        caregivingResponsibilities:
          type: string
        additionalContext:
          type: string
        meetingDate:
          type: string
          description: "ISO date string of proposed meeting"
      required:
        - name
        - city
        - country
    ContextInsightResponse:
      type: object
      properties:
        insight:
          type: string
        readiness:
          type: string
          enum: [green, yellow, red]
        summary:
          type: string
      required:
        - insight
        - readiness
        - summary

